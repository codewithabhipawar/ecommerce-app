server:
  port: 8084

spring:
  datasource:
    username: postgres
    password: root
    url: jdbc:postgresql://localhost:5432/microservices
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  application:
    name: order-service
